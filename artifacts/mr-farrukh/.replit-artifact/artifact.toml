kind = "web"
previewPath = "/"
title = "Mr. Farrukh"
version = "1.0.0"
id = "artifacts/mr-farrukh"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22978

[services.development]
run = "pnpm --filter @workspace/mr-farrukh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mr-farrukh", "run", "build" ]
serve = "static"
publicDir = "artifacts/mr-farrukh/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22978"
BASE_PATH = "/"
